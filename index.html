<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GROKFLIX ULTRA</title>

<style>
:root{--bg:#0f0f0f;--card:#1c1c1c;--accent:#e50914}
body{margin:0;background:var(--bg);color:#fff;font-family:Arial}
header{padding:15px 30px;background:#000;color:var(--accent);font-size:26px;font-weight:bold}
.container{width:95%;max-width:1200px;margin:auto}
video{width:100%;border-radius:10px;background:black}
.section{margin-top:30px}
.grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(160px,1fr));gap:12px}
.card{background:var(--card);padding:10px;border-radius:8px;cursor:pointer;text-align:center}
.card:hover{background:var(--accent)}
.ai-panel{position:fixed;top:0;right:0;width:300px;height:100%;background:#111;border-left:2px solid #e50914;display:flex;flex-direction:column}
.ai-header{padding:10px;background:#e50914}
.ai-messages{flex:1;overflow:auto;padding:10px}
.ai-input{display:flex}
.ai-input input{flex:1;padding:8px;border:none}
.ai-input button{background:#e50914;border:none;color:white;padding:8px}
</style>
</head>

<body>

<header>GROKFLIX ULTRA</header>

<div class="container">

<video id="video" controls>
<source id="source" src="https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4">
</video>

<div class="section">
<h2>🇹🇷 Türkçe Çizgi Filmler</h2>
<div class="grid">

<div class="card" onclick="play('https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/BigBuckBunny.mp4')">Big Buck Bunny (TR)</div>
<div class="card" onclick="play('https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/Sintel.mp4')">Sintel (TR)</div>
<div class="card" onclick="play('https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4')">Elephants Dream (TR)</div>
<div class="card" onclick="play('https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/TearsOfSteel.mp4')">Tears of Steel (TR)</div>
<div class="card" onclick="play('https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerFun.mp4')">Animasyon Fun (TR)</div>
<div class="card" onclick="play('https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4')">Joyrides (TR)</div>
<div class="card" onclick="play('https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerEscape.mp4')">Escape (TR)</div>
<div class="card" onclick="play('https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerBlazes.mp4')">Blazes (TR)</div>
<div class="card" onclick="play('https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerMeltdowns.mp4')">Meltdown (TR)</div>

</div>
</div>

</div>

<!-- AI BÖLÜMÜ (AYRI ALAN) -->
<div class="section" id="aiSection">
  <h2>🤖 Yapay Zeka Asistanı</h2>
  <div class="ai-box">
    <div class="ai-messages" id="aiMessages"></div>
    <div class="ai-input">
      <input id="aiInput" placeholder="Mesaj yaz...">
      <button onclick="sendAI()">Gönder</button>
    </div>
  </div>
</div>

<style>
.ai-box{background:#111;border-radius:10px;padding:10px;max-width:600px}
.ai-messages{height:200px;overflow:auto;margin-bottom:10px}
.ai-input{display:flex}
.ai-input input{flex:1;padding:10px;border:none}
.ai-input button{background:#e50914;border:none;color:#fff;padding:10px}
</style>

<script>
function play(url){
 const video=document.getElementById('video');
 const source=document.getElementById('source');
 source.src=url;
 video.load();
 video.play().catch(()=>{});
}

function sendAI(){
 const input=document.getElementById('aiInput');
 const box=document.getElementById('aiMessages');
 const msg=input.value;
 if(!msg) return;
 box.innerHTML+=`<div>Sen: ${msg}</div>`;

 let reply="Ne izlemek istersin?";
 if(msg.includes("çizgi")) reply="Sintel veya Big Buck Bunny öneririm";
 if(msg.includes("aksiyon")) reply="Tears of Steel izle";

 box.innerHTML+=`<div>AI: ${reply}</div>`;
 input.value="";
 box.scrollTop=box.scrollHeight;
}
</script>

</body>
</html>
